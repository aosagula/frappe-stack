name: Deploy production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            DEPLOY_PATH="${{ secrets.VPS_DEPLOY_PATH }}"
            REPO_SSH_URL="${{ secrets.REPO_SSH_URL }}"

            mkdir -p "$DEPLOY_PATH"

            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              if [ -n "$(find "$DEPLOY_PATH" -mindepth 1 -maxdepth 1 -print -quit)" ]; then
                echo "Deploy path exists but is not a Git repository: $DEPLOY_PATH" >&2
                echo "Move its contents away or choose an empty VPS_DEPLOY_PATH." >&2
                exit 1
              fi

              git clone "$REPO_SSH_URL" "$DEPLOY_PATH"
            fi

            cd "$DEPLOY_PATH"
            git fetch origin main
            git reset --hard origin/main
            git submodule sync --recursive
            git submodule update --init --recursive
            docker network inspect reverse-proxy >/dev/null 2>&1 || docker network create reverse-proxy
            docker compose --env-file deploy/production/.env -f deploy/production/compose.yml build
            docker compose --env-file deploy/production/.env -f deploy/production/compose.yml up -d mariadb redis-cache redis-queue redis-socketio
            docker compose --env-file deploy/production/.env -f deploy/production/compose.yml run --rm init
            docker compose --env-file deploy/production/.env -f deploy/production/compose.yml up -d
