name: Deploy production

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        run: |
          set -euo pipefail

          for attempt in 1 2 3; do
            if docker buildx create --name frappe-builder --driver docker-container --use; then
              if docker buildx inspect --bootstrap --builder frappe-builder; then
                exit 0
              fi
            fi

            docker buildx rm frappe-builder >/dev/null 2>&1 || true
            sleep $((attempt * 20))
          done

          docker buildx create --name frappe-builder --driver docker-container --use
          docker buildx inspect --bootstrap --builder frappe-builder

      - uses: docker/build-push-action@v6
        with:
          builder: frappe-builder
          context: .
          file: deploy/production/Dockerfile
          push: true
          tags: ghcr.io/aosagula/frappe-production:main
          cache-from: type=registry,ref=ghcr.io/aosagula/frappe-production:cache
          cache-to: type=registry,ref=ghcr.io/aosagula/frappe-production:cache,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 30m
          script_stop: true
          envs: GHCR_TOKEN,GHCR_USER,DEPLOY_PATH
          script: |
            set -euo pipefail

            export FRAPPE_IMAGE="ghcr.io/aosagula/frappe-production:main"

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            mkdir -p "$DEPLOY_PATH"

            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              if [ -n "$(find "$DEPLOY_PATH" -mindepth 1 -maxdepth 1 -print -quit)" ]; then
                echo "Deploy path exists but is not a Git repository: $DEPLOY_PATH" >&2
                exit 1
              fi
              git clone "${{ secrets.REPO_SSH_URL }}" "$DEPLOY_PATH"
            fi

            cd "$DEPLOY_PATH"
            git fetch origin main
            git reset --hard origin/main

            docker network inspect reverse-proxy >/dev/null 2>&1 || docker network create reverse-proxy
            docker compose --env-file deploy/production/.env -f deploy/production/compose.yml pull
            docker compose --env-file deploy/production/.env -f deploy/production/compose.yml up -d mariadb redis-cache redis-queue redis-socketio
            docker compose --env-file deploy/production/.env -f deploy/production/compose.yml run --rm init
            docker compose --env-file deploy/production/.env -f deploy/production/compose.yml up -d
            docker compose --env-file deploy/production/.env -f deploy/production/compose.yml run --rm backend sh -lc 'bench --site "${SITE_NAME:-frappe.agentic4biz.com}" clear-cache && bench --site "${SITE_NAME:-frappe.agentic4biz.com}" clear-website-cache'
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
